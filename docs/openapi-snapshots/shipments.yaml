        href: /api/v3/shipments/retrieve-shipments
      x-sendcloud-paginated: true
      x-sendcloud-paginated-discriminator: shipments
      tags:
        - Shipments
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                description: Retrieve shipments
                type: object
                properties:
                  data:
                    type: array
                    uniqueItems: true
                    minItems: 1
                    items:
                      $ref: '#/components/schemas/shipment-response'
                required:
                  - data
              examples:
