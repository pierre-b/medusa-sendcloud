      operationId: sc-public-v3-scp-get-all_shipments
      security:
        - HTTPBasicAuth: []
        - OAuth2ClientCreds: []
      parameters:
        - schema:
            oneOf:
              - type: string
              - type: integer
          in: query
          name: parcel_status
          description: >-
            Returns shipments that have the requested status. For a list of
            possible statuses, see the [Retrieve a list of parcel
            statuses](/api/v3/parcel-statuses/retrieve-a-list-of-parcel-statuses)
            endpoint.
        - schema:
            type: string
          in: query
          name: tracking_number
          description: Returns shipments that match a specified tracking number
        - schema:
            type: string
          in: query
          name: external_reference_id
          description: Returns shipments that match a specified external reference
        - schema:
            type: string
          in: query
          name: order_number
          description: >-
            Returns a shipment that matches a specific `order_number` property
            from your shipments
        - schema:
            type: string
          in: query
          name: integration_id
          description: >-
            Returns all shipments that matches a specific `integration_id`
            property from your shipments
        - schema:
            type: string
            example: '2018-02-26T11:01:47.505309+00:00'
          in: query
          name: updated_before
          description: >-
            Returns all shipments which have been updated in our system before a
            given time. Use the ISO 8601 datetime format.
        - schema:
            type: string
            example: '2018-02-26T11:01:47.505309+00:00'
          in: query
          name: updated_after
          description: >-
            Returns all shipments which have been updated in our system after a
            given time. Use the ISO 8601 datetime format.
        - schema:
            type: string
            example: '2018-02-26T11:01:47.505309+00:00'
          in: query
          name: announced_before
          description: >-
            Returns all shipments which have been announced to the carrier
            before the given time. Use the ISO 8601 datetime format.
        - schema:
            type: string
            example: '2018-02-26T11:01:47.505309+00:00'
          in: query
          name: announced_after
          description: >-
            Returns all shipments which have been announced to the carrier after
            the given time. Use the ISO 8601 datetime format.
        - schema:
            type: string
            example: 13579,24680,12345
          in: query
          name: ids
          description: >-
            Filter results using a comma-separated list of *parcels IDs*. The
            list may not contain more than 100 IDs.
        - schema:
            type: string
            example: >-
              4df31240-daef-40bf-81fc-7a83184073e6,adbb3dce-9756-42b0-838d-a478a5236289
          in: query
          name: shipment_uuids
          description: >-
            Filter results using a comma-separated list of *shipments IDs*. The
            list may not contain more than 100 IDs.
        - $ref: '#/components/parameters/Cursor'
        - schema:
            type: integer
            minimum: 1
            default: 40
            maximum: 100
            example: 10
          in: query
          name: page_size
          description: The maximum number of items to be returned in the response.
    post:
      summary: Create and announce a shipment asynchronously
      description: >-
        This endpoint **announces a shipment asynchronously** under your API
        credentials.
      x-mint:
        href: /api/v3/shipments/create-and-announce-a-shipment-asynchronously
        content: >-
          ## International shipments


          If you want to create a shipment to be sent to a destination country
          outside the EU, it's mandatory to include additional information
          related to the shipment contents. This allows Sendcloud to
          automatically generate the required customs documentation based on the
          international shipping option selected. After the shipping label and
          associated documents are generated, you can retrieve and download them
          via the [Retrieve a parcel
          document](/api/v3/parcel-documents/retrieve-a-parcel-document)
          endpoint.


          Note that when passing along prices, mixed currencies are not
          accepted. Therefore, ensure that all price fields use the same
          currency.


          ## Multicollo


          Learn more about multicollo in our [Multicollo
          guide](/docs/shipping/multicollo).
