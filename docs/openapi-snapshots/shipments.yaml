  /shipments/create-with-shipping-rules:
    post:
      summary: >-
        Create a shipment with rules and/or defaults and announce it
        asynchronously
      description: >-
        Create and announce a shipment applying shipping rules and/or defaults
        asynchronously.
      x-mint:
        href: >-
          /api/v3/shipments/create-a-shipment-with-rules-and-or-default-and-announce-it-asynchronously
        content: >-
          The main advantage of this endpoint over the [Create and announce a
          shipment
          asynchronously](/api/v3/shipments/create-and-announce-a-shipment-asynchronously)
          endpoint (and also the difference between them) is the ability to
          apply [shipping rules](https://app.sendcloud.com/v2/shipping/rules)
          and [shipping
          defaults](https://app.sendcloud.com/v2/shipping/shipping-defaults) to
          a shipment. Because of this, more fields in this endpoint are
          optional.


          **Note: the shipment (parcels) will be linked to the integration
          identified by the API credentials you supply as request authentication
          (`Basic ...`).**


          ## Shipping rules


          - **Due to the data (shipments) that we receive in this API, NOT all
          of the shipping rules (actions or conditions) can (and will) be
          applied.**

          - **Shipping rules do not fully apply to multicollo shipments.
            In such cases, the rule conditions for weight, parcel dimensions (height, length, width), total order value, item name, item quantity, item SKU and total parcel item value will not be matched.
            Additionally, the following actions will not be triggered:**
            - Using a box (Use box)
            - Setting the weight (Set weight)
            - Setting the number of parcels (Set number of parcels)
            - Insuring the shipment value (Insure shipment value by)
            - Insuring it by percentage (Insure shipment value by %)
            - Increasing item value by percentage (Decrease item value by %)
            - Setting item HS code (Set Item HS Code)
            - Setting item name (Set item name)
            - Setting item origin country (Set Item Origin Country)
            - Setting item value (Set item value)
            - Setting item weight (Set item weight)

          **Please consider these limitations when defining rules.**


          ### Shipping rules conditions (IF) that can be applied


          - Carrier

          - Checkout delivery method

          - Company name

          - Customer email

          - Integration

          - Item SKU

          - Item name

          - Item quantity

          - Parcel height (cm)

          - Parcel length (cm)

          - Parcel width (cm)

          - Phone number

          - Postal code

          - To country

          - Total order value

          - Total parcel item value

          - Weight (kg)


          ## Shipping rules actions (THEN) that can be applied


          - Add customs declaration statement

          - Use box

          - Decrease item value by %

          - Insure shipment value by

          - Insure shipment value by %

          - Set customs general notes

          - Set customer email

          - Set Item HS Code

          - Set item name

          - Set Item Origin Country

          - Set item value

          - Set item weight

          - Set number of parcels

          - Phone number

          - Ship with address

          - Ship with

          - Set weight

          - Use shipping contract
      tags:
        - Shipments
