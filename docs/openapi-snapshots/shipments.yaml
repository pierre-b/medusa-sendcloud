openapi: 3.1.0
info:
  title: Shipments
  version: 3.0.0
  description: >-
    The Shipments API allows you to create and announce, retrieve, and cancel
    outgoing shipments and their associated parcels within the Sendcloud
    platform.
  contact:
    name: Sendcloud API Support
    email: contact@sendcloud.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://panel.sendcloud.sc/api/v3
    description: Sendcloud Production
tags:
  - name: Shipments
    description: Shipments API
paths:
  /shipments/announce:
    post:
      summary: Create and announce a shipment synchronously
      description: >-
        This endpoint **announces a shipment synchronously** under your API
        credentials.
      x-mint:
        href: /api/v3/shipments/create-and-announce-a-shipment-synchronously
        content: >-
          ## International shipments


          If you want to create a shipment to be sent to a destination country
          outside the EU, it's mandatory to include additional information
          related to the shipment contents. This allows Sendcloud to
          automatically generate the required customs documentation based on the
          international shipping option selected. After the shipping label and
          associated documents are generated, you can retrieve and download them
          via the [Retrieve a parcel
          document](/api/v3/parcel-documents/retrieve-a-parcel-document)
          endpoint.


          Note that when passing along prices, mixed currencies are not
          accepted. Therefore, ensure that all price fields use the same
          currency.
      tags:
        - Shipments
      operationId: sc-public-v3-scp-post-announce_shipment
      parameters:
        - $ref: '#/components/parameters/SendcloudPartnerId'
      requestBody:
