  /shipments:
    get:
      summary: Retrieve shipments
      description: >-
        This endpoint allows you to retrieve a list of all the shipments which
        you have created or imported into your Sendcloud account under your API
        credentials. You can filter the results based on several query
        parameters.


        This endpoint uses cursor-based pagination via `Link` headers. See
        [Pagination](/api/v3/pagination) for details.
